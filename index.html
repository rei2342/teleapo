<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>テレアポスクリプト｜ニジカケ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#f5f4f0;color:#1a1a18;min-height:100vh;padding:2rem 1rem}
.app{max-width:760px;margin:0 auto}
.header{margin-bottom:2rem}
.header h1{font-size:18px;font-weight:500;color:#1a1a18;margin-bottom:4px}
.header p{font-size:13px;color:#888780}
.progress-bar{display:flex;align-items:center;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap;background:#fff;border:0.5px solid #e0dfd8;border-radius:10px;padding:10px 14px}
.crumb{font-size:12px;color:#888780;cursor:pointer;text-decoration:none}
.crumb:hover{color:#1a1a18}
.crumb.current{color:#1a1a18;font-weight:500}
.crumb-sep{font-size:12px;color:#b4b2a9}
.phase-badge{display:inline-block;font-size:11px;font-weight:500;padding:3px 10px;border-radius:99px;margin-bottom:12px}
.badge-reception{background:#E1F5EE;color:#085041}
.badge-person{background:#EEEDFE;color:#3C3489}
.badge-director{background:#FAEEDA;color:#633806}
.badge-close{background:#EAF3DE;color:#27500A}
.badge-obj{background:#FCEBEB;color:#791F1F}
.badge-followup{background:#F1EFE8;color:#444441}
.script-card{background:#fff;border:0.5px solid #e0dfd8;border-radius:12px;padding:1.25rem;margin-bottom:12px}
.script-label{font-size:11px;color:#888780;margin-bottom:6px;font-weight:500}
.script-text{font-size:14px;line-height:1.9;color:#1a1a18;white-space:pre-wrap}
.note{background:#f5f4f0;border-left:2px solid #b4b2a9;padding:10px 14px;margin-bottom:16px}
.note p{font-size:13px;line-height:1.7;color:#5f5e5a}
.choices-label{font-size:11px;font-weight:500;color:#888780;margin-bottom:8px;letter-spacing:0.05em;text-transform:uppercase}
.choices{display:flex;flex-direction:column;gap:8px}
.choice-btn{background:#fff;border:0.5px solid #d3d1c7;border-radius:8px;padding:12px 16px;text-align:left;cursor:pointer;font-size:13px;line-height:1.6;color:#1a1a18;transition:background 0.1s;font-family:inherit;width:100%}
.choice-btn:hover{background:#f5f4f0}
.choice-btn .arrow{float:right;color:#888780;margin-left:12px}
.type-select-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.type-card{background:#fff;border:0.5px solid #d3d1c7;border-radius:12px;padding:1rem 1.25rem;cursor:pointer;transition:border-color 0.15s}
.type-card:hover{border-color:#888780}
.type-card h3{font-size:13px;font-weight:500;margin-bottom:4px;color:#1a1a18}
.type-card p{font-size:12px;color:#5f5e5a;line-height:1.6}
.start-note{font-size:13px;color:#5f5e5a;margin-bottom:16px}
.divider{border:none;border-top:0.5px solid #e0dfd8;margin:16px 0}
.direct-btn{background:#fff;border:0.5px solid #d3d1c7;border-radius:8px;padding:12px 16px;text-align:left;cursor:pointer;font-size:13px;color:#1a1a18;font-family:inherit;width:100%;margin-top:4px}
.direct-btn:hover{background:#f5f4f0}
@media(max-width:480px){.type-select-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>テレアポスクリプト</h1>
    <p>ニジカケ｜歯科衛生士セカンドキャリア支援アライアンス</p>
  </div>
  <div class="progress-bar" id="breadcrumb"></div>
  <div id="screen"></div>
</div>

<script>
const SENT='sent',NEW='new';
let contactType=null,history=[];

const nodes={
  start:{},
  reception:{
    badge:'reception',badgeText:'受付',label:'あなた',
    script:t=>t===SENT
      ?`「お世話になっております。\n歯科衛生士のキャリア支援をしております、ニジカケと申します。\n先日、採用ご担当の方あてにご連絡をお入れしておりまして、その件でご確認させていただきたいことがございました。\n採用のご担当の方はいらっしゃいますでしょうか？」`
      :`「お世話になっております。\n歯科衛生士のキャリア支援をしております、ニジカケと申します。\n御グループの採用の件でお話をさせていただきたく、お電話いたしました。\n採用のご担当の方はいらっしゃいますでしょうか？」`,
    note:'「お世話になっております」から入り初めまして感を出さない。用件は最小限にして担当者へのパスだけを取りにいく。',
    choices:[
      {label:'採用担当・人事に繋いでもらえた',next:'personnel'},
      {label:'院長に直接繋いでもらえた',next:'director_from_reception'},
      {label:'「担当不在・後で折り返す」と言われた',next:'absent'},
      {label:'「担当者に伝えておく」で終わられた',next:'message_only'},
    ]
  },
  director_direct:{
    badge:'director',badgeText:'院長直通',label:'あなた',
    script:t=>t===SENT
      ?`「お世話になっております。\nニジカケの〇〇と申します。\n先日、採用に関してご連絡をお入れしておりまして、院長先生に直接お話できればと思いお電話しました。\n少しだけお時間よろしいでしょうか？」`
      :`「お世話になっております。突然のご連絡、失礼いたします。\nニジカケの〇〇と申します。\n歯科衛生士のキャリア支援をしている会社でして、御院の採用に関してご提案があり、院長先生に直接お話できればと思いお電話しました。\n1〜2分だけよろしいでしょうか？」`,
    note:'院長直通の場合は最初から短さを約束する。「1〜2分だけ」で警戒を解いてから本題へ。',
    choices:[
      {label:'聞いてもらえた',next:'director_pitch'},
      {label:'「担当に言っておく」と言われた',next:'message_only'},
      {label:'断られた・忙しいと言われた',next:'obj_busy'},
    ]
  },
  director_from_reception:{
    badge:'director',badgeText:'院長（受付経由）',label:'あなた',
    script:()=>`「お世話になっております。ニジカケの〇〇と申します。\nお繋ぎいただきありがとうございます。\n歯科衛生士の採用に関して、御院にとってご負担なくご活用いただける仕組みをご提案したく、お電話いたしました。\n2〜3分だけお時間いただけますでしょうか？」`,
    note:'受付経由で院長に繋がった場合。「お繋ぎいただきありがとうございます」で受付への感謝を一言入れると印象がいい。',
    choices:[
      {label:'聞いてもらえた',next:'director_pitch'},
      {label:'断られた・忙しいと言われた',next:'obj_busy'},
    ]
  },
  director_pitch:{
    badge:'director',badgeText:'院長：本題',label:'あなた',
    script:()=>`「ありがとうございます。\n弊社は歯科衛生士専門のキャリア支援をしておりまして、\n採用活動の中で生じた『不採用の応募者』を、本人の同意のもと他院へご紹介し、\nその成果に応じて御院に還元される仕組みをご提案しております。\n\n御院に新たな費用やリスクは一切発生せず、\n実際に成果が出た場合のみ還元が生じる設計です。\n\n一度、15〜20分ほどお時間をいただけませんでしょうか？\nオンライン・ご訪問、どちらでも対応可能です。」`,
    note:'「費用・リスクなし、成果連動」を核心に。院長は時間がないので簡潔に。詳細は商談でやる。',
    choices:[
      {label:'アポが取れた',next:'closing'},
      {label:'「資料を送って」と言われた',next:'obj_material'},
      {label:'「今は採用を考えていない」',next:'obj_no_hiring'},
      {label:'「他社と契約している」',next:'obj_other_agency'},
      {label:'「個人情報の扱いが心配」',next:'obj_privacy'},
    ]
  },
  personnel:{
    badge:'person',badgeText:'採用担当・人事',label:'あなた',
    script:t=>t===SENT
      ?`「お世話になっております。ニジカケの〇〇と申します。\n先日、採用に関してご連絡をお入れしておりまして、一度詳しくお話させていただけないかと思いご連絡いたしました。\n\n弊社は歯科衛生士専門のキャリア支援をしておりまして、\n採用活動の中で生じた『不採用の応募者』を他院へご紹介し、\n御グループにその成果に応じた還元をご提供できる仕組みをご提案しております。\n\n御グループ側のご負担やリスクは一切なく、成果が出た場合のみ還元が発生する設計です。\n15〜20分ほどお時間をいただけませんでしょうか？`
      :`「お世話になっております。突然のご連絡、失礼いたします。ニジカケの〇〇と申します。\n\n弊社は歯科衛生士専門のキャリア支援をしておりまして、\n採用活動の中で生じた『不採用の応募者』を、本人の同意のもと他院へご紹介し、\n御グループにその成果に応じた還元をご提供できる仕組みをご提案しております。\n\n御グループ側のご負担やリスクは一切なく、成果が出た場合のみ還元が発生する設計です。\n15〜20分ほどお時間をいただけませんでしょうか？」`,
    note:'「費用・リスクなし、成果連動」を早めに出して警戒を解く。詳細は商談でやる。ここはアポだけを取りにいく。',
    choices:[
      {label:'アポが取れた',next:'closing'},
      {label:'「院長・上長に確認する」と言われた',next:'check_with_director'},
      {label:'「資料を送って」と言われた',next:'obj_material'},
      {label:'「今は採用を考えていない」',next:'obj_no_hiring'},
      {label:'「他社と契約している」',next:'obj_other_agency'},
      {label:'「個人情報の扱いが心配」',next:'obj_privacy'},
      {label:'「忙しい」と言われた',next:'obj_busy'},
    ]
  },
  check_with_director:{
    badge:'person',badgeText:'院長確認パターン',label:'あなた',
    script:()=>`「ありがとうございます。もちろんです。\nお手数ですが、ご確認いただいた後、ご連絡いただくことは可能でしょうか？\nご都合のよいお時間帯をお伺いできれば、こちらからあらためてご連絡いたします。\n\n念のため、弊社としては費用・リスクゼロでお試しいただける内容ですので、\nその点だけお伝えいただけると幸いです。」`,
    note:'折り返しの主導権は相手に渡さず「こちらからかける」流れにする。院長への伝言ポイントとして「費用・リスクゼロ」だけ残してもらう。',
    choices:[
      {label:'折り返しの約束が取れた',next:'closing_callback'},
      {label:'「また連絡します」で終わった',next:'message_only'},
    ]
  },
  absent:{
    badge:'followup',badgeText:'担当不在',label:'あなた',
    script:()=>`「承知いたしました。それでは、ご担当の方がいらっしゃるお時間帯をお教えいただけますでしょうか？\nあらためてご連絡させていただきます。」`,
    note:'折り返しを相手に委ねると連絡が来ないことが多い。「こちらからかける」流れに誘導する。',
    choices:[
      {label:'時間帯を教えてもらえた',next:'closing_callback'},
      {label:'「折り返す」と言われた',next:'message_only'},
    ]
  },
  message_only:{
    badge:'followup',badgeText:'伝言・折り返し待ち',label:'メモ',
    script:()=>`【対応メモ】\n・1〜2営業日後に再架電する\n・次回は「先日ご連絡した件で、その後いかがでしょうか」と入る\n・3回かけて繋がらない場合はメール or フォームで補完する`,
    note:'「伝えておく」は基本的に流れる。必ず自分から再架電する日時を決めておく。',
    choices:[{label:'はじめに戻る',next:'start'}]
  },
  closing:{
    badge:'close',badgeText:'クロージング',label:'あなた',
    script:()=>`「ありがとうございます。\nでは、〇月〇日か〇日、午前・午後どちらかご都合よろしいタイミングはございますでしょうか？\nオンライン・ご訪問、どちらでも対応可能です。」`,
    note:'日程は2択で提示する。「いつがいいですか？」と丸投げすると決まらない。',
    choices:[{label:'日程確定 → 完了',next:'done'}]
  },
  closing_callback:{
    badge:'close',badgeText:'再架電メモ',label:'メモ',
    script:()=>`【再架電メモ】\n・約束した日時にかける\n・「先日お話させていただいた件で、その後いかがでしょうか」から入る\n・担当者が出たら採用担当フローへ / 院長が出たら院長：本題フローへ`,
    note:'再架電時は初回よりもスムーズに担当者に繋いでもらえることが多い。約束した時間の5〜10分前後に架電する。',
    choices:[{label:'はじめに戻る',next:'start'}]
  },
  done:{
    badge:'close',badgeText:'完了',label:'',
    script:()=>`✅ アポ取得完了\n\n商談はレイ・パートナーで対応。\n以下を記録して引き継ぐ：\n・医院名 / グループ名\n・担当者名\n・連絡先（TEL / メール）\n・日時・形式（オンライン or 訪問）`,
    note:'',
    choices:[{label:'はじめに戻る',next:'start'}]
  },
  obj_material:{
    badge:'obj',badgeText:'切り返し：資料を送って',label:'あなた',
    script:()=>`「ありがとうございます。お送りいたします。\nただ内容が少し複雑でして、資料だけではお伝えしきれない部分があります。\nお送りのタイミングで、15分ほど一緒に確認させていただくお時間をいただけますか？\nそのほうが誤解なくお伝えできます。」`,
    note:'資料だけ送って終わりにしない。必ず「一緒に確認する時間」を抱き合わせる。',
    choices:[
      {label:'アポが取れた',next:'closing'},
      {label:'それでも断られた',next:'obj_final'},
    ]
  },
  obj_no_hiring:{
    badge:'obj',badgeText:'切り返し：採用を考えていない',label:'あなた',
    script:()=>`「承知いたしました。\nただ、弊社の仕組みは採用が動いていない時期でも、\n今後に備えてアライアンスだけ結んでおいていただければご負担はゼロです。\n次に採用が動いた際にすぐ活用いただけますので、\n10〜15分だけお話だけ聞いていただけますか？」`,
    note:'「今じゃない」に対しては「今決めなくていい、準備だけ」という切り口が有効。',
    choices:[
      {label:'アポが取れた',next:'closing'},
      {label:'それでも断られた',next:'obj_final'},
    ]
  },
  obj_other_agency:{
    badge:'obj',badgeText:'切り返し：他社と契約している',label:'あなた',
    script:()=>`「そうでございますか。\n弊社の仕組みは既存の採用活動や他社サービスと並走できる設計で、\n競合するものではございません。\n追加コストも発生しませんので、ご参考程度に一度お話だけ聞いていただけますか？」`,
    note:'「競合しない・追加コストゼロ」を強調。既存契約を否定せず、補完関係として提案する。',
    choices:[
      {label:'アポが取れた',next:'closing'},
      {label:'それでも断られた',next:'obj_final'},
    ]
  },
  obj_busy:{
    badge:'obj',badgeText:'切り返し：忙しい',label:'あなた',
    script:()=>`「承知いたしました。15分以内でお伝えできます。\n来週以降でご都合のよいお時間はございますでしょうか？\nオンラインでも対応できますので、お時間をとっていただきやすい形でご調整いたします。」`,
    note:'「短い・オンラインOK」の2点を出してハードルを下げる。「15分以内」は必ず守る。',
    choices:[
      {label:'アポが取れた',next:'closing'},
      {label:'それでも断られた',next:'obj_final'},
    ]
  },
  obj_privacy:{
    badge:'obj',badgeText:'切り返し：個人情報が心配',label:'あなた',
    script:()=>`「ご指摘ありがとうございます。\n応募者ご本人の同意取得を前提とした仕組みですので、\n御院が個人情報を弊社に提供するわけではございません。\nその点も含めて詳しくご説明させていただければと思います。\n15分ほどお時間いただけますか？」`,
    note:'「御院は個人情報を出さない」という点を明確に。不安の核心を先に解消してからアポへ誘導。',
    choices:[
      {label:'アポが取れた',next:'closing'},
      {label:'それでも断られた',next:'obj_final'},
    ]
  },
  obj_final:{
    badge:'obj',badgeText:'最終断り対応',label:'あなた',
    script:()=>`「承知いたしました。またご状況が変わった際にはぜひご連絡させてください。\n本日はお時間いただきありがとうございました。」`,
    note:'無理に押さない。「また状況が変わったら」で次の接触余地を残して終わる。リストからは外さず再架電候補として残す。',
    choices:[{label:'はじめに戻る',next:'start'}]
  },
};

const badgeClass={reception:'badge-reception',person:'badge-person',director:'badge-director',close:'badge-close',obj:'badge-obj',followup:'badge-followup'};
const nodeLabels={reception:'受付',personnel:'採用担当',director_from_reception:'院長(受付経由)',director_direct:'院長直通',director_pitch:'院長：本題',check_with_director:'院長確認中',absent:'不在対応',message_only:'伝言',closing:'クロージング',closing_callback:'再架電',done:'完了',obj_material:'資料希望',obj_no_hiring:'採用予定なし',obj_other_agency:'他社契約',obj_busy:'忙しい',obj_privacy:'個人情報',obj_final:'最終断り'};

function setType(t){contactType=t;history=[];go('reception')}
function go(nodeId){
  if(nodeId==='start'){contactType=null;history=[];render('start');return}
  history.push(nodeId);render(nodeId);
}
function goBack(idx){history=history.slice(0,idx+1);render(history[history.length-1])}

function render(nodeId){
  const node=nodes[nodeId];
  if(!node)return;
  const bc=document.getElementById('breadcrumb');
  const scr=document.getElementById('screen');

  if(nodeId==='start'){
    bc.innerHTML='<span class="crumb current">スタート</span>';
    scr.innerHTML=`
      <p class="start-note">まず、対象医院の種別を選んでください</p>
      <div class="type-select-grid">
        <div class="type-card" onclick="setType('sent')">
          <h3>資料送付済み</h3>
          <p>問い合わせフォーム等から<br>すでに資料を送った医院</p>
        </div>
        <div class="type-card" onclick="setType('new')">
          <h3>未送付（ゼロベース）</h3>
          <p>まだ一切コンタクト<br>していない医院</p>
        </div>
      </div>
      <hr class="divider">
      <p class="start-note" style="margin-bottom:8px">または</p>
      <button class="direct-btn" onclick="(function(){contactType='new';history=[];go('director_direct')})()">📞 院長が直接出た（受付なし）</button>
    `;
    return;
  }

  bc.innerHTML=`<span class="crumb" onclick="go('start')">スタート</span>`+
    history.map((id,i)=>`<span class="crumb-sep">›</span><span class="crumb ${i===history.length-1?'current':''}" onclick="goBack(${i})">${nodeLabels[id]||id}</span>`).join('');

  const s=node.script?node.script(contactType):'';
  const badge=node.badge?`<span class="phase-badge ${badgeClass[node.badge]}">${node.badgeText}</span>`:'';
  const scriptBlock=s?`<div class="script-card"><div class="script-label">${node.label||''}</div><div class="script-text">${s}</div></div>`:'';
  const noteBlock=node.note?`<div class="note"><p>💡 ${node.note}</p></div>`:'';
  const choicesHtml=node.choices&&node.choices.length
    ?`<div class="choices-label">相手の反応</div><div class="choices">${node.choices.map(c=>`<button class="choice-btn" onclick="go('${c.next}')">${c.label}<span class="arrow">›</span></button>`).join('')}</div>`
    :'';

  scr.innerHTML=badge+scriptBlock+noteBlock+(choicesHtml?`<div>${choicesHtml}</div>`:'');
}

render('start');
</script>
</body>
</html>
